<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{Title}</title>

<link rel="shortcut icon" href="{Favicon}">
<link rel="alternate" type="application/rss+xml" href="{RSS}">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:monospace;
background:#07071a;
color:white;
}

/* header */

#header{
text-align:center;
padding:40px 20px;
position:absolute;
width:100%;
z-index:5;
pointer-events:none;
}

#header a{pointer-events:auto}

#blog-title{
font-size:44px;
color:white;
text-decoration:none;
text-shadow:0 0 40px rgba(180,130,255,.6);
}

#blog-desc{
opacity:.5;
margin-top:6px;
margin-bottom:0;
}

/* arena */

#arena{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

/* canvas background */

#canvas-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

/* tumblr data */

.post-data{
display:none;
}

/* bubbles */

.bubble{
position:absolute;
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:16px;
cursor:pointer;
color:white;
border:none;
transition:transform .25s,box-shadow .25s;
animation:floaty 4s ease-in-out infinite;
outline:none;
overflow:hidden;
gap:6px;
}

.bubble:hover,
.bubble:focus-visible{
transform:scale(1.12);
z-index:10;
box-shadow:0 0 0 3px rgba(255,255,255,.5),0 0 28px var(--shadow),0 0 60px var(--shadow);
}

/* thumbnail image inside bubble */

.bubble-thumb{
width:52px;
height:52px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.45);
box-shadow:0 2px 10px rgba(0,0,0,.4);
flex-shrink:0;
/* no title: larger thumb */
}

.bubble.photo-only .bubble-thumb{
width:68px;
height:68px;
}

.bubble-title{
font-size:12px;
font-weight:600;
line-height:1.3;
text-shadow:0 1px 4px rgba(0,0,0,.5);
user-select:none;
max-width:90%;
display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;
}

@keyframes floaty{
0%,100%{margin-top:0}
50%{margin-top:-8px}
}

/* sparkle */

.bubble::after{
content:'✦';
position:absolute;
top:12%;
right:16%;
font-size:9px;
opacity:.7;
animation:twinkle 2s ease-in-out infinite;
pointer-events:none;
}

.bubble::before{
content:'✦';
position:absolute;
bottom:14%;
left:14%;
font-size:6px;
opacity:.5;
animation:twinkle 2.4s ease-in-out infinite reverse;
pointer-events:none;
}

@keyframes twinkle{
0%,100%{opacity:.2;transform:scale(.8)}
50%{opacity:.9;transform:scale(1.2)}
}

/* modal */

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
display:none;
align-items:center;
justify-content:center;
z-index:999;
backdrop-filter:blur(6px);
}

#overlay.open{
display:flex;
}

.post-card{
background:linear-gradient(145deg,#13112a,#1a1535);
padding:36px;
max-width:700px;
width:90%;
max-height:80vh;
overflow-y:auto;
scroll-behavior:smooth;
border-radius:24px;
border:1px solid rgba(180,130,255,.25);
box-shadow:0 0 60px rgba(160,100,255,.2);
position:relative;
}

.post-card::-webkit-scrollbar{width:4px}
.post-card::-webkit-scrollbar-track{background:transparent}
.post-card::-webkit-scrollbar-thumb{background:rgba(180,130,255,.4);border-radius:4px}

.close-btn{
background:none;
border:none;
color:white;
position:absolute;
top:16px;
right:20px;
cursor:pointer;
font-size:22px;
opacity:.6;
padding:4px 8px;
border-radius:6px;
line-height:1;
transition:opacity .15s;
}

.close-btn:hover,
.close-btn:focus-visible{
opacity:1;
outline:2px solid rgba(180,130,255,.6);
outline-offset:2px;
}

.modal-title{
font-size:28px;
margin:0 0 12px;
background:linear-gradient(90deg,#ff9de2,#c77dff,#7ec8e3);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.modal-meta{
font-size:12px;
opacity:.4;
margin-bottom:16px;
display:block;
}

.modal-body{
line-height:1.7;
opacity:.9;
}

.modal-body img{
max-width:100%;
border-radius:10px;
display:block;
}

@media(max-width:480px){
#blog-title{font-size:28px}
#header{padding:24px 16px}
}

</style>
</head>

<body>

<canvas id="canvas-bg" aria-hidden="true"></canvas>

<header id="header">
  <a href="/" id="blog-title">{Title}</a>
  <p id="blog-desc">{Description}</p>
</header>

<main id="arena" aria-label="Posts">

{block:Posts}

{block:Text}
<div class="post-data"
  data-title="{block:Title}{Title}{/block:Title}"
  data-date="{ShortMonth} {DayOfMonth}, {Year}">
  <div class="post-body">{Body}</div>
</div>
{/block:Text}

{block:Photo}
<div class="post-data"
  data-title="{block:Caption}{Caption}{/block:Caption}"
  data-date="{ShortMonth} {DayOfMonth}, {Year}"
  data-image="{PhotoURL-100}">
  <div class="post-body">
    <img src="{PhotoURL-500}" alt="{block:Caption}{Caption}{/block:Caption}">
    {block:Caption}<p>{Caption}</p>{/block:Caption}
  </div>
</div>
{/block:Photo}

{/block:Posts}

</main>

<div id="overlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-title">

  <div class="post-card">

    <button class="close-btn" id="close-btn" aria-label="Đóng bài viết">✕</button>

    <h2 class="modal-title" id="modal-title"></h2>

    <time class="modal-meta" id="modal-meta"></time>

    <div class="modal-body" id="modal-body"></div>

  </div>

</div>

<script>

const PALETTES=[
{bg:'linear-gradient(135deg,#ff6bbd,#ff9de2)',shadow:'rgba(255,107,189,.55)'},
{bg:'linear-gradient(135deg,#c77dff,#9b5de5)',shadow:'rgba(155,93,229,.6)'},
{bg:'linear-gradient(135deg,#7ec8e3,#4ea8de)',shadow:'rgba(78,168,222,.55)'},
{bg:'linear-gradient(135deg,#f9c74f,#f4845f)',shadow:'rgba(244,132,95,.6)'},
{bg:'linear-gradient(135deg,#56cfe1,#48bfe3)',shadow:'rgba(86,207,225,.55)'},
{bg:'linear-gradient(135deg,#ff9de2,#ffb3c6)',shadow:'rgba(255,157,226,.5)'},
{bg:'linear-gradient(135deg,#a8edea,#6dc5c1)',shadow:'rgba(168,237,234,.45)'},
]

const rand=(a,b)=>Math.random()*(b-a)+a

function escapeHTML(str){
return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function getPosts(){
return [...document.querySelectorAll('.post-data')].map(el=>{
const body=el.querySelector('.post-body')
/* photo posts set data-image in template; text posts: extract first <img> from body */
let image=el.dataset.image||''
if(!image){
const img=body.querySelector('img')
if(img)image=img.src
}
return{
title:el.dataset.title||'',
date:el.dataset.date,
body:body.innerHTML,
image
}
})
}

function overlaps(a,b,pad=14){
return!(a.x+a.w+pad<b.x||b.x+b.w+pad<a.x||a.y+a.h+pad<b.y||b.y+b.h+pad<a.y)
}

function buildBubbles(){
const arena=document.getElementById('arena')
arena.querySelectorAll('.bubble').forEach(b=>b.remove())

const posts=getPosts()
const W=window.innerWidth
const H=window.innerHeight
const placed=[]

posts.forEach((post,i)=>{
const hasImage=!!post.image
const hasTitle=!!post.title
/* slightly bigger bubble when showing both image and title */
const minSize=hasImage&&hasTitle?140:hasImage?120:110
const size=rand(minSize,minSize+70)

const pal=PALETTES[i%PALETTES.length]

const bubble=document.createElement('button')
bubble.className='bubble'
if(hasImage&&!hasTitle)bubble.classList.add('photo-only')
bubble.setAttribute('aria-label',post.title||`Bài viết ${i+1}`)
bubble.style.setProperty('--shadow',pal.shadow)
bubble.style.width=size+'px'
bubble.style.height=size+'px'
bubble.style.background=pal.bg
bubble.style.boxShadow=`0 0 28px ${pal.shadow},0 0 60px ${pal.shadow}`
bubble.style.animationDelay=`${(i*0.37)%4}s`

let x,y,tries=0
do{
x=rand(10,Math.max(10,W-size-10))
y=rand(130,Math.max(130,H-size-80))
tries++
}while(tries<30&&placed.some(r=>overlaps({x,y,w:size,h:size},r)))

placed.push({x,y,w:size,h:size})
bubble.style.left=x+'px'
bubble.style.top=y+'px'

let content=''
if(hasImage){
content+=`<img class="bubble-thumb" src="${escapeHTML(post.image)}" alt="" loading="lazy">`
}
if(hasTitle){
content+=`<div class="bubble-title">${escapeHTML(post.title)}</div>`
}
if(content)bubble.innerHTML=content

bubble.addEventListener('click',()=>openModal(post))
arena.appendChild(bubble)
})
}

let prevFocus=null

function openModal(post){
const titleEl=document.getElementById('modal-title')
const metaEl=document.getElementById('modal-meta')
const bodyEl=document.getElementById('modal-body')
const overlay=document.getElementById('overlay')

prevFocus=document.activeElement

if(post.title){
titleEl.textContent=post.title
titleEl.style.display='block'
}else{
titleEl.style.display='none'
}

metaEl.textContent=post.date
bodyEl.innerHTML=post.body
overlay.classList.add('open')
document.getElementById('close-btn').focus()
overlay.addEventListener('keydown',trapFocus)
}

function closeModal(){
const overlay=document.getElementById('overlay')
overlay.classList.remove('open')
overlay.removeEventListener('keydown',trapFocus)
if(prevFocus)prevFocus.focus()
}

function trapFocus(e){
if(e.key!=='Tab')return
const focusable=[...document.querySelector('.post-card').querySelectorAll('button,a,[tabindex]:not([tabindex="-1"])')].filter(el=>!el.disabled)
if(!focusable.length)return
const first=focusable[0],last=focusable[focusable.length-1]
if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus()}}
else{if(document.activeElement===last){e.preventDefault();first.focus()}}
}

document.getElementById('close-btn').addEventListener('click',closeModal)

document.getElementById('overlay').addEventListener('click',e=>{
if(e.target.id==='overlay')closeModal()
})

document.addEventListener('keydown',e=>{
if(e.key==='Escape'&&document.getElementById('overlay').classList.contains('open'))closeModal()
})

/* ── starfield ── */

const cvs=document.getElementById('canvas-bg')
const ctx=cvs.getContext('2d')
let stars=[],rafId=null

function resize(){
cvs.width=window.innerWidth
cvs.height=window.innerHeight
stars.forEach(s=>{s.x=Math.random()*cvs.width;s.y=Math.random()*cvs.height})
}

function initStars(n=120){
stars=[]
for(let i=0;i<n;i++){
stars.push({
x:Math.random()*cvs.width,
y:Math.random()*cvs.height,
r:Math.random()*1.5+.3,
phase:Math.random()*Math.PI*2,
color:`hsl(${200+Math.random()*160},80%,80%)`
})
}
}

function drawStars(){
ctx.clearRect(0,0,cvs.width,cvs.height)
const t=Date.now()*.001
stars.forEach(s=>{
const a=.3+(Math.sin(t*3+s.phase)*.5+.5)*.6
ctx.globalAlpha=a
ctx.fillStyle=s.color
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()
})
ctx.globalAlpha=1
rafId=requestAnimationFrame(drawStars)
}

document.addEventListener('visibilitychange',()=>{
if(document.hidden)cancelAnimationFrame(rafId)
else rafId=requestAnimationFrame(drawStars)
})

let resizeTimer
window.addEventListener('resize',()=>{
clearTimeout(resizeTimer)
resizeTimer=setTimeout(()=>{resize();buildBubbles()},150)
})

window.addEventListener('DOMContentLoaded',()=>{
resize()
initStars()
drawStars()
buildBubbles()
})

</script>

</body>
</html>
