<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{Title}</title>

<link rel="shortcut icon" href="{Favicon}">
<link rel="alternate" type="application/rss+xml" href="{RSS}">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:monospace;
background:#07071a;
color:white;
/* removed overflow:hidden — allow fallback scrolling if JS fails */
}

/* header */

#header{
text-align:center;
padding:40px 20px;
position:absolute;
width:100%;
z-index:5;
pointer-events:none; /* let clicks pass through to bubbles behind */
}

#header a{pointer-events:auto}

#blog-title{
font-size:44px;
color:white;
text-decoration:none;
text-shadow:0 0 40px rgba(180,130,255,.6);
}

#blog-desc{
opacity:.5;
margin-top:6px;
}

/* arena */

#arena{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

/* canvas background */

#canvas-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

/* tumblr data */

.post-data{
display:none;
}

/* bubbles */

.bubble{
position:absolute;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:18px;
cursor:pointer;
color:white;
transition:transform .25s,box-shadow .25s;
/* animation-delay set per-bubble via JS for staggered effect */
animation:floaty 4s ease-in-out infinite;
/* keyboard focus */
outline:none;
}

.bubble:hover,
.bubble:focus-visible{
transform:scale(1.12);
z-index:10;
box-shadow: 0 0 0 3px rgba(255,255,255,.5), 0 0 28px var(--shadow), 0 0 60px var(--shadow);
}

.bubble-title{
font-size:13px;
font-weight:600;
line-height:1.3;
text-shadow:0 1px 4px rgba(0,0,0,.4);
/* prevent text selection on click */
user-select:none;
}

@keyframes floaty{
0%,100%{margin-top:0}
50%{margin-top:-8px}
}

/* sparkle */

.bubble::after{
content:'✦';
position:absolute;
top:15%;
right:18%;
font-size:10px;
opacity:.7;
animation:twinkle 2s ease-in-out infinite;
pointer-events:none;
}

.bubble::before{
content:'✦';
position:absolute;
bottom:18%;
left:16%;
font-size:7px;
opacity:.5;
animation:twinkle 2.4s ease-in-out infinite reverse;
pointer-events:none;
}

@keyframes twinkle{
0%,100%{opacity:.2;transform:scale(.8)}
50%{opacity:.9;transform:scale(1.2)}
}

/* modal */

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
display:none;
align-items:center;
justify-content:center;
z-index:999;
backdrop-filter:blur(6px);
}

#overlay.open{
display:flex;
}

.post-card{
background:linear-gradient(145deg,#13112a,#1a1535);
padding:36px;
max-width:700px;
width:90%;
max-height:80vh;
overflow-y:auto;
scroll-behavior:smooth;
border-radius:24px;
border:1px solid rgba(180,130,255,.25);
box-shadow:0 0 60px rgba(160,100,255,.2);
position:relative;
}

/* scrollbar inside modal */
.post-card::-webkit-scrollbar{width:4px}
.post-card::-webkit-scrollbar-track{background:transparent}
.post-card::-webkit-scrollbar-thumb{background:rgba(180,130,255,.4);border-radius:4px}

.close-btn{
/* use <button> in markup — these are purely visual overrides */
background:none;
border:none;
color:white;
position:absolute;
top:16px;
right:20px;
cursor:pointer;
font-size:22px;
opacity:.6;
padding:4px 8px;
border-radius:6px;
line-height:1;
transition:opacity .15s;
}

.close-btn:hover,
.close-btn:focus-visible{
opacity:1;
outline:2px solid rgba(180,130,255,.6);
outline-offset:2px;
}

.modal-title{
font-size:28px;
margin-bottom:12px;
background:linear-gradient(90deg,#ff9de2,#c77dff,#7ec8e3);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.modal-meta{
font-size:12px;
opacity:.4;
margin-bottom:16px;
}

.modal-body{
line-height:1.7;
opacity:.9;
}

.modal-body img{
max-width:100%;
border-radius:10px;
display:block;
}

/* responsive: smaller bubbles & header on mobile */
@media(max-width:480px){
#blog-title{font-size:28px}
#header{padding:24px 16px}
}

</style>
</head>

<body>

<canvas id="canvas-bg" aria-hidden="true"></canvas>

<header id="header">
<a href="/" id="blog-title">{Title}</a>
<p id="blog-desc">{Description}</p>
</header>

<main id="arena" aria-label="Posts">

{block:Posts}

{block:Text}
<div class="post-data"
data-title="{block:Title}{Title}{/block:Title}"
data-date="{ShortMonth} {DayOfMonth}, {Year}">
<div class="post-body">{Body}</div>
</div>
{/block:Text}

{block:Photo}
<div class="post-data"
data-title=""
data-date="{ShortMonth} {DayOfMonth}, {Year}">
<div class="post-body">
<img src="{PhotoURL-500}" alt="{block:Caption}{Caption}{/block:Caption}">
{block:Caption}<p>{Caption}</p>{/block:Caption}
</div>
</div>
{/block:Photo}

{/block:Posts}

</main>

<div id="overlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-title">

  <div class="post-card">

    <button class="close-btn" id="close-btn" aria-label="Đóng bài viết">✕</button>

    <h2 class="modal-title" id="modal-title"></h2>

    <time class="modal-meta" id="modal-meta"></time>

    <div class="modal-body" id="modal-body"></div>

  </div>

</div>

<script>

const PALETTES=[
{bg:'linear-gradient(135deg,#ff6bbd,#ff9de2)',shadow:'rgba(255,107,189,.55)'},
{bg:'linear-gradient(135deg,#c77dff,#9b5de5)',shadow:'rgba(155,93,229,.6)'},
{bg:'linear-gradient(135deg,#7ec8e3,#4ea8de)',shadow:'rgba(78,168,222,.55)'},
{bg:'linear-gradient(135deg,#f9c74f,#f4845f)',shadow:'rgba(244,132,95,.6)'},
{bg:'linear-gradient(135deg,#56cfe1,#48bfe3)',shadow:'rgba(86,207,225,.55)'},
{bg:'linear-gradient(135deg,#ff9de2,#ffb3c6)',shadow:'rgba(255,157,226,.5)'},
{bg:'linear-gradient(135deg,#a8edea,#6dc5c1)',shadow:'rgba(168,237,234,.45)'},
]

const rand=(a,b)=>Math.random()*(b-a)+a

/* sanitize text before inserting as HTML to prevent XSS */
function escapeHTML(str){
return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function getPosts(){
return [...document.querySelectorAll('.post-data')].map(el=>({
title:el.dataset.title||'',
date:el.dataset.date,
body:el.querySelector('.post-body').innerHTML
}))
}

/* simple collision helper: returns true if two rects overlap with padding */
function overlaps(a,b,pad=12){
return !(a.x+a.w+pad<b.x||b.x+b.w+pad<a.x||a.y+a.h+pad<b.y||b.y+b.h+pad<a.y)
}

function buildBubbles(){
const arena=document.getElementById('arena')
/* remove any existing bubbles on rebuild */
arena.querySelectorAll('.bubble').forEach(b=>b.remove())

const posts=getPosts()
const W=window.innerWidth
const H=window.innerHeight
const placed=[]

posts.forEach((post,i)=>{
const size=rand(110,180)
const pal=PALETTES[i%PALETTES.length]

const bubble=document.createElement('button') /* semantic button for keyboard access */
bubble.className='bubble'
bubble.setAttribute('aria-label',post.title||`Bài viết ${i+1}`)

/* CSS custom property for focus ring color */
bubble.style.setProperty('--shadow',pal.shadow)
bubble.style.width=size+'px'
bubble.style.height=size+'px'
bubble.style.background=pal.bg
bubble.style.boxShadow=`0 0 28px ${pal.shadow},0 0 60px ${pal.shadow}`

/* staggered float animation so bubbles don't all bob in sync */
bubble.style.animationDelay=`${(i*0.37)%4}s`

/* collision-aware placement — try up to 30 times */
let x,y,tries=0
do{
x=rand(10,Math.max(10,W-size-10))
y=rand(130,Math.max(130,H-size-80))
tries++
}while(tries<30&&placed.some(r=>overlaps({x,y,w:size,h:size},r)))

placed.push({x,y,w:size,h:size})
bubble.style.left=x+'px'
bubble.style.top=y+'px'

if(post.title){
bubble.innerHTML=`<div class="bubble-title">${escapeHTML(post.title)}</div>`
}

bubble.addEventListener('click',()=>openModal(post))

arena.appendChild(bubble)
})
}

/* track the element focused before modal opened so we can restore it */
let prevFocus=null

function openModal(post){
const titleEl=document.getElementById('modal-title')
const metaEl=document.getElementById('modal-meta')
const bodyEl=document.getElementById('modal-body')
const overlay=document.getElementById('overlay')

prevFocus=document.activeElement

if(post.title){
titleEl.textContent=post.title
titleEl.style.display='block'
}else{
titleEl.style.display='none'
}

metaEl.textContent=post.date
/* post.body comes from Tumblr template — trusted source for the theme owner */
bodyEl.innerHTML=post.body

overlay.classList.add('open')

/* move focus into modal */
const closeBtn=document.getElementById('close-btn')
closeBtn.focus()

/* trap focus inside modal */
overlay.addEventListener('keydown',trapFocus)
}

function closeModal(){
const overlay=document.getElementById('overlay')
overlay.classList.remove('open')
overlay.removeEventListener('keydown',trapFocus)
/* restore focus to the bubble that opened the modal */
if(prevFocus)prevFocus.focus()
}

function trapFocus(e){
if(e.key!=='Tab')return
const card=document.querySelector('.post-card')
const focusable=[...card.querySelectorAll('button,a,[tabindex]:not([tabindex="-1"])')].filter(el=>!el.disabled)
if(!focusable.length)return
const first=focusable[0]
const last=focusable[focusable.length-1]
if(e.shiftKey){
if(document.activeElement===first){e.preventDefault();last.focus()}
}else{
if(document.activeElement===last){e.preventDefault();first.focus()}
}
}

document.getElementById('close-btn').addEventListener('click',closeModal)

document.getElementById('overlay').addEventListener('click',e=>{
if(e.target.id==='overlay')closeModal()
})

/* close on Escape key */
document.addEventListener('keydown',e=>{
if(e.key==='Escape'&&document.getElementById('overlay').classList.contains('open'))closeModal()
})

/* ── canvas starfield ── */

const cvs=document.getElementById('canvas-bg')
const ctx=cvs.getContext('2d')
let stars=[]
let rafId=null

function resize(){
cvs.width=window.innerWidth
cvs.height=window.innerHeight
/* rescale existing star positions instead of rebuilding */
stars.forEach(s=>{
s.x=Math.random()*cvs.width
s.y=Math.random()*cvs.height
})
}

function initStars(n=120){
stars=[]
for(let i=0;i<n;i++){
stars.push({
x:Math.random()*cvs.width,
y:Math.random()*cvs.height,
r:Math.random()*1.5+.3,
phase:Math.random()*Math.PI*2,
color:`hsl(${200+Math.random()*160},80%,80%)`
})
}
}

function drawStars(){
ctx.clearRect(0,0,cvs.width,cvs.height)
const t=Date.now()*0.001
stars.forEach(s=>{
const a=.3+(Math.sin(t*3+s.phase)*.5+.5)*.6
ctx.globalAlpha=a
ctx.fillStyle=s.color
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()
})
ctx.globalAlpha=1
rafId=requestAnimationFrame(drawStars)
}

/* pause animation when the tab is hidden to save CPU */
document.addEventListener('visibilitychange',()=>{
if(document.hidden){
cancelAnimationFrame(rafId)
}else{
rafId=requestAnimationFrame(drawStars)
}
})

/* debounce resize handler */
let resizeTimer
window.addEventListener('resize',()=>{
clearTimeout(resizeTimer)
resizeTimer=setTimeout(()=>{
resize()
buildBubbles()
},150)
})

window.addEventListener('DOMContentLoaded',()=>{
resize()
initStars()
drawStars()
buildBubbles()
})

</script>

</body>
</html>
